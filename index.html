<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CR7 - The GOAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            position: fixed;
        }

        /* Fullscreen Video Background Box */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Elegant Calligraphy Text Overlay */
        .overlay-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            pointer-events: none; 
        }

        .header-title {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 2.5rem;
            letter-spacing: 6px;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0px 4px 20px rgba(0, 0, 0, 0.8);
            margin-top: 20px;
        }

        .header-title span {
            display: block;
            font-size: 1rem;
            letter-spacing: 4px;
            color: #d4af37; 
            margin-top: 5px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
        }

        /* Floating Mute Button (Turn Audio Off) */
        .audio-control-btn {
            position: absolute;
            bottom: 40px;
            z-index: 3;
            background: rgba(214, 175, 55, 0.2);
            border: 1px solid #d4af37;
            color: #fff;
            padding: 12px 30px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: none; /* Stays hidden until the user enters */
        }

        /* Initial Enter Overlay to bypass browser audio blocks */
        .enter-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        .enter-btn {
            font-family: 'Cinzel', serif;
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 15px 40px;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(214, 175, 55, 0.2);
        }

        .enter-overlay:hover .enter-btn {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 30px rgba(214, 175, 55, 0.4);
        }

        @media (max-width: 480px) {
            .header-title { font-size: 1.8rem; letter-spacing: 4px; }
            .header-title span { font-size: 0.8rem; }
            .audio-control-btn { padding: 10px 24px; font-size: 0.8rem; bottom: 50px; }
        }
    </style>
</head>
<body>

    <!-- Enter Screen (Satisfies browser audio requirements instantly) -->
    <div class="enter-overlay" id="enterOverlay" onclick="startExperience()">
        <button class="enter-btn">ENTER EXPERIENCE</button>
    </div>

    <!-- Video Box -->
    <div class="video-background">
        <video id="cr7Video" loop playsinline>
            <source src="ronaldo.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Typography Layer -->
    <div class="overlay-content">
        <h1 class="header-title">
            Cristiano Ronaldo
            <span>The Greatest Of All Time</span>
        </h1>
    </div>

    <!-- Live Toggle Mute Button -->
    <button class="audio-control-btn" id="audioBtn" onclick="toggleAudio()">🔊 MUTE AUDIO</button>

    <script>
        const video = document.getElementById('cr7Video');
        const audioBtn = document.getElementById('audioBtn');
        const enterOverlay = document.getElementById('enterOverlay');

        function startExperience() {
            // Unfade the splash wall
            enterOverlay.style.opacity = '0';
            
            // Remove from layout after fade animation completes
            setTimeout(() => {
                enterOverlay.style.display = 'none';
            }, 500);

            // Play unmuted with audio right away
            video.muted = false;
            video.play();
            
            // Bring up the quick action mute button 
            audioBtn.style.display = 'block';
        }

        function toggleAudio() {
            if (!video.muted) {
                video.muted = true;
                audioBtn.innerHTML = "🔇 UNMUTE";
                audioBtn.style.background = "rgba(255, 255, 255, 0.1)";
                audioBtn.style.borderColor = "rgba(255, 255, 255, 0.4)";
            } else {
                video.muted = false;
                audioBtn.innerHTML = "🔊 MUTE AUDIO";
                audioBtn.style.background = "rgba(214, 175, 55, 0.2)";
                audioBtn.style.borderColor = "#d4af37";
            }
        }
    </script>

</body>
</html>
