<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CR7 - The GOAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            position: fixed;
        }

        /* 1. Premium Entrance Screen (Bypasses Browser Restrictions) */
        .gate-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #111 0%, #000 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .gate-title {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 2.8rem;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-align: center;
            text-transform: uppercase;
        }

        .gate-subtitle {
            font-size: 0.9rem;
            color: #d4af37; /* Gold */
            letter-spacing: 5px;
            margin-bottom: 50px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .enter-btn {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 15px 40px;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.4s ease;
        }

        .enter-btn:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        /* 2. Video Player Layout */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 3. Minimal Mute Toggle Button */
        .mute-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .mute-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* Ambient Dark Vignette Overlay */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .gate-title { font-size: 2rem; letter-spacing: 5px; }
            .gate-subtitle { font-size: 0.75rem; letter-spacing: 3px; }
            .mute-btn { top: 20px; right: 20px; width: 44px; height: 44px; }
        }
    </style>
</head>
<body>

    <!-- The Gateway Cover Screen -->
    <div class="gate-screen" id="gateScreen">
        <h1 class="gate-title">CR7</h1>
        <p class="gate-subtitle">The Greatest of all time</p>
        <button class="enter-btn" onclick="startExperience()">Enter</button>
    </div>

    <!-- Mute Action Button -->
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()" style="display: none;">🔊</button>

    <!-- Native Adaptive Video Engine -->
    <div class="vignette"></div>
    <div class="video-background">
        <!-- Notice 'muted' is missing so audio plays dynamically on trigger -->
        <video id="cr7Video" loop playsinline>
            <source src="ronaldo.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const video = document.getElementById('cr7Video');
        const gate = document.getElementById('gateScreen');
        const muteBtn = document.getElementById('muteBtn');

        function startExperience() {
            // 1. Hide the entry gate smoothly
            gate.style.opacity = '0';
            setTimeout(() => {
                gate.style.display = 'none';
            }, 800);

            // 2. Show the mute option
            muteBtn.style.display = 'flex';

            // 3. Play video directly with sound on!
            video.muted = false;
            video.play().catch(err => {
                console.log("Safeguard forced mute fallback:", err);
                // Pure fallback loop in case of mobile restrictions
                video.muted = true;
                video.play();
            });
        }

        function toggleMute() {
            if (video.muted) {
                video.muted = false;
                muteBtn.innerHTML = "🔊";
            } else {
                video.muted = true;
                muteBtn.innerHTML = "🔇";
            }
        }
    </script>

</body>
</html>
