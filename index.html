<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CR7 - The GOAT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Removes the ugly blue flash when tapping buttons on mobile */
        }

        html, body {
            width: 100%;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height handles mobile address bars perfectly */
            overflow: hidden;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            position: fixed;
            touch-action: none; /* Prevents mobile rubber-banding/bouncing scrolls */
        }

        /* 1. Mobile-First Gateway Cover Screen */
        .gate-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: radial-gradient(circle, #151515 0%, #000 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .gate-title {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 3rem;
            letter-spacing: 8px;
            margin-bottom: 5px;
            text-align: center;
            text-transform: uppercase;
        }

        .gate-subtitle {
            font-size: 0.8rem;
            color: #d4af37; /* Gold */
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
            font-weight: 300;
            text-align: center;
        }

        .enter-btn {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 14px 45px;
            font-size: 0.95rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 30px; /* Rounded pill style looks cleaner on mobile devices */
            transition: all 0.4s ease;
            font-weight: 500;
        }

        .enter-btn:hover, .enter-btn:active {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
        }

        /* 2. Responsive Video Container Layout */
        .video-container {
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            z-index: 1;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Guarantees the video stretches to fill 100% of the screen space on mobile */
            z-index: -1;
        }

        /* Ambient Dark Vignette Overlay */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            z-index: 2;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
        }

        /* Typography Display Overlay (Positioned to fit mobile screens perfectly) */
        .typography-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: env(safe-area-inset-top, 40px) 20px; /* Handles notch/island offsets on modern phones */
            pointer-events: none;
            display: none;
        }

        .video-title {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 2.2rem;
            letter-spacing: 6px;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0px 4px 20px rgba(0, 0, 0, 0.9);
            margin-top: 20px;
        }

        .video-subtitle {
            display: block;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: #d4af37;
            margin-top: 8px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.9);
            text-transform: uppercase;
        }

        /* 3. Mobile-First Mute Toggle Button Placement */
        .mute-btn {
            position: absolute;
            bottom: calc(30px + env(safe-area-inset-bottom, 0px)); /* Anchored safely at the bottom right for easy thumb access */
            right: 25px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: none;
        }

        /* Scaling Adjustments for Smaller Screens */
        @media (max-width: 480px) {
            .gate-title { font-size: 2.4rem; letter-spacing: 6px; }
            .gate-subtitle { font-size: 0.75rem; letter-spacing: 3px; }
            .video-title { font-size: 1.8rem; letter-spacing: 4px; }
            .video-subtitle { font-size: 0.75rem; letter-spacing: 3px; }
            .mute-btn { width: 50px; height: 50px; font-size: 1.2rem; bottom: 40px; right: 20px; }
        }
    </style>
</head>
<body>

    <!-- Gateway Cover Screen -->
    <div class="gate-screen" id="gateScreen">
        <h1 class="gate-title">CR7</h1>
        <p class="gate-subtitle">The Greatest of all time</p>
        <button class="enter-btn" onclick="startExperience()">Enter</button>
    </div>

    <!-- Active Presentation Area -->
    <div class="video-container" id="mainContainer">
        
        <!-- Calligraphy Text Overlay layers -->
        <div class="typography-overlay" id="textOverlay">
            <h2 class="video-title">Cristiano Ronaldo</h2>
            <p class="video-subtitle">Greatest of All Time</p>
        </div>

        <!-- Lower Right Quick-Mute Action -->
        <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊</button>

        <div class="vignette"></div>

        <!-- Adaptive Native Mobile Video Engine -->
        <video id="cr7Video" loop playsinline webkit-playsinline x5-playsinline>
            <source src="ronaldo.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const video = document.getElementById('cr7Video');
        const gate = document.getElementById('gateScreen');
        const muteBtn = document.getElementById('muteBtn');
        const textOverlay = document.getElementById('textOverlay');

        // Force mobile viewport locks to stop annoying scroll bounces completely
        document.body.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        function startExperience() {
            // Hide entry gate
            gate.style.opacity = '0';
            setTimeout(() => {
                gate.style.display = 'none';
            }, 800);

            // Turn on layout UI layers
            muteBtn.style.display = 'flex';
            textOverlay.style.display = 'flex';

            // Fire unmuted video initialization
            video.muted = false;
            video.play().catch(err => {
                console.log("Mobile browser hardware constraint encountered:", err);
                // Fail-safe auto recovery
                video.muted = true;
                video.play();
                muteBtn.innerHTML = "🔇";
            });
        }

        function toggleMute() {
            if (video.muted) {
                video.muted = false;
                muteBtn.innerHTML = "🔊";
            } else {
                video.muted = true;
                muteBtn.innerHTML = "🔇";
            }
        }
    </script>

</body>
</html>
