<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CR7 - The GOAT</title>
    <!-- Premium Calligraphy & Clean Typography Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            position: fixed;
        }

        /* Fullscreen Video Background Box */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Forces video to cover entire mobile or PC screen beautifully */
        }

        /* Elegant Calligraphy Text Overlay */
        .overlay-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            pointer-events: none; /* Allows click events to pass right through to controls */
        }

        .header-title {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 2.5rem;
            letter-spacing: 6px;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0px 4px 20px rgba(0, 0, 0, 0.8);
            margin-top: 20px;
        }

        .header-title span {
            display: block;
            font-size: 1rem;
            letter-spacing: 4px;
            color: #d4af37; /* Premium Gold Accent */
            margin-top: 5px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
        }

        /* High-Tier Floating Unmute Action Button */
        .audio-control-btn {
            position: absolute;
            bottom: 40px;
            z-index: 3;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            padding: 12px 30px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .audio-control-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            transform: scale(1.05);
        }

        /* Micro Mobile Screen Adjustments */
        @media (max-width: 480px) {
            .header-title { font-size: 1.8rem; letter-spacing: 4px; }
            .header-title span { font-size: 0.8rem; }
            .audio-control-btn { padding: 10px 24px; font-size: 0.8rem; bottom: 50px; }
        }
    </style>
</head>
<body>

    <!-- Native Adaptive Video Engine -->
    <div class="video-background">
        <!-- 'muted autoplay playsinline' forces it to play immediately on load everywhere -->
        <video id="cr7Video" loop autoplay muted playsinline>
            <source src="ronaldo.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Luxury Typography Display Layer -->
    <div class="overlay-content">
        <h1 class="header-title">
            Cristiano Ronaldo
            <span>The Greatest Of All Time</span>
        </h1>
    </div>

    <!-- Interactive Layer to enable audio tracking instantly -->
    <button class="audio-control-btn" id="audioBtn" onclick="toggleAudio()">🔊 TAP FOR AUDIO</button>

    <script>
        const video = document.getElementById('cr7Video');
        const button = document.getElementById('audioBtn');

        function toggleAudio() {
            if (video.muted) {
                video.muted = false;
                button.innerHTML = "⏸ PAUSE AUDIO";
                button.style.background = "rgba(214, 175, 55, 0.2)"; /* Soft Gold Glow */
                button.style.borderColor = "#d4af37";
            } else {
                video.muted = true;
                button.innerHTML = "🔊 TAP FOR AUDIO";
                button.style.background = "rgba(255, 255, 255, 0.1)";
                button.style.borderColor = "rgba(255, 255, 255, 0.4)";
            }
        }

        // Failsafe option: Force auto-play initialization in case background engine hangs
        document.addEventListener('DOMContentLoaded', () => {
            video.play().catch(err => {
                console.log("Autoplay blocked by core browser layout config:", err);
            });
        });
    </script>

</body>
</html>
